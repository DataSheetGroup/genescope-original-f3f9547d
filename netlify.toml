[build]
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  NITRO_PRESET = "netlify"
  NODE_VERSION = "20"

# TanStack Start / Nitro emits Netlify Functions under .netlify/functions-internal
# when NITRO_PRESET=netlify. The functions handler is wired automatically.
# SPA/SSR fallback: any unmatched route goes to the SSR function.
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = false
